[pytest]
testpaths = tests
pythonpath = .
addopts = --tb=short -v
markers =
    smoke: Smoke test cases
    regression: Regression test cases
    login: Login related tests
    supplier: Supplier management tests
    customer: Customer management tests
    product: Product management tests
    purchase: Purchase order tests
    sales: Sales order tests
    inventory: Inventory tests
    ui: UI tests
    api: API tests
    data_driven: Data-driven tests
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning