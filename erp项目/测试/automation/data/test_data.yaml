# -------------------- 测试用例描述 --------------------
test_cases:
  login:
    - name: "登录成功"
      data_key: "valid_user"
      expected: "成功跳转到仪表盘"
    
    - name: "登录失败-无效账号"
      data_key: "invalid_user"
      expected: "停留在登录页或显示错误"
    
    - name: "登录失败-空用户名"
      data_key: "empty_username"
      expected: "提示用户名不能为空"
    
    - name: "登录失败-空密码"
      data_key: "empty_password"
      expected: "提示密码不能为空"

  supplier:
    - name: "创建供应商成功"
      data_key: "valid_supplier"
      expected: "供应商列表中存在新创建的记录"
    
    - name: "创建供应商-仅必填字段"
      data_key: "minimal_supplier"
      expected: "成功创建供应商"
    
    - name: "创建供应商失败-缺少名称"
      data_key: "invalid_supplier"
      expected: "提示名称不能为空"
