<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>明远电子科技 ERP 管理系统 - 登录</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="login-body">
    <div class="login-container">
        <div class="login-header">
            <h1>明远电子科技</h1>
            <p class="subtitle">ERP 企业资源管理系统</p>
        </div>

        <div class="login-form">
            <div class="form-group">
                <label>用户名</label>
                <input type="text" id="username" placeholder="请输入用户名" value="admin">
            </div>
            <div class="form-group">
                <label>密码</label>
                <input type="password" id="password" placeholder="请输入密码" value="admin123">
            </div>
            <button class="btn btn-primary btn-block" onclick="doLogin()">登 录</button>
            <div id="loginMsg" class="login-msg"></div>
        </div>

        <div class="login-footer">
            <p>测试账号：admin / manager / test（密码均为 XXX123）</p>
            <p>&copy; 2024 明远电子科技有限公司</p>
        </div>
    </div>

    <script>
        function doLogin() {
            var username = document.getElementById('username').value.trim();
            var password = document.getElementById('password').value.trim();
            var msg = document.getElementById('loginMsg');

            if (!username || !password) {
                msg.innerHTML = '<span style="color:#e74c3c">请输入用户名和密码</span>';
                return;
            }

            msg.innerHTML = '<span style="color:#3498db">正在登录...</span>';

            fetch('/api/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({username: username, password: password})
            })
            .then(res => res.json())
            .then(data => {
                if (data.code === 0) {
                    msg.innerHTML = '<span style="color:#27ae60">登录成功！正在跳转...</span>';
                    localStorage.setItem('token', data.data.token);
                    localStorage.setItem('user', JSON.stringify(data.data.user));
                    setTimeout(() => { window.location.href = '/dashboard'; }, 500);
                } else {
                    msg.innerHTML = '<span style="color:#e74c3c">' + data.msg + '</span>';
                }
            })
            .catch(err => {
                msg.innerHTML = '<span style="color:#e74c3c">网络错误，请稍后重试</span>';
            });
        }

        document.getElementById('password').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') doLogin();
        });
    </script>
</body>
</html>
